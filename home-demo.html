<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>게임 홈 레이아웃 데모</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{--accent:#ff4d72;--gold:#ffc247}
  body{font-family:-apple-system,"Apple SD Gothic Neo",sans-serif;color:#f3edfb;
    background:linear-gradient(165deg,#181128,#0c0917);min-height:100vh}
  #app{max-width:440px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden;padding-bottom:76px;
    background:
      radial-gradient(ellipse 82% 40% at 22% -6%,#3f2c68 0,transparent 55%),
      radial-gradient(ellipse 72% 38% at 94% 30%,#5e2a52 0,transparent 55%)}
  #app::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(1.5px 1.5px at 14% 12%,rgba(255,255,255,.5),transparent),
      radial-gradient(1px 1px at 66% 8%,rgba(255,255,255,.4),transparent),
      radial-gradient(1.5px 1.5px at 86% 22%,rgba(255,236,190,.5),transparent),
      radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,.35),transparent);}
  .wrap{position:relative;z-index:1;padding:14px 15px 0}

  /* 상단 프로필/재화 바 */
  .top{display:flex;align-items:center;gap:11px;margin-bottom:16px}
  .top .logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(145deg,#ff6588,#df315a);
    display:flex;align-items:center;justify-content:center;font-size:24px;flex:none;
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.4),0 6px 14px -4px rgba(255,77,114,.6)}
  .top .who{flex:1;min-width:0}
  .top .who .nm{font-size:16px;font-weight:900;line-height:1.1}
  .top .who .lv{font-size:11px;color:#ab9ec6;margin-top:2px}
  .cur{display:flex;gap:7px}
  .cur .chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800}
  .cur .chip b{color:var(--gold)}
  .icobtn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex:none}

  /* 히어로: 대표 데뷔조 무대 */
  .hero{position:relative;border-radius:20px;overflow:hidden;height:230px;margin-bottom:16px;
    box-shadow:0 16px 36px -12px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1)}
  .hero .imgs{position:absolute;inset:0;display:flex}
  .hero .imgs div{flex:1;background-size:cover;background-position:top center}
  .hero .imgs div:nth-child(2){margin:0 -6px}
  .hero .ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,6,16,.95) 4%,rgba(8,6,16,.35) 40%,rgba(120,40,90,.15) 100%)}
  .hero .badge{position:absolute;top:12px;left:12px;display:flex;gap:6px}
  .hero .badge span{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;backdrop-filter:blur(4px)}
  .hero .b-live{background:rgba(49,211,138,.25);border:1px solid rgba(49,211,138,.5);color:#7ff0bc}
  .hero .b-rank{background:rgba(255,194,71,.2);border:1px solid rgba(255,194,71,.45);color:#ffe0a0}
  .hero .gr{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:12px;
    background:conic-gradient(from 0deg,#ffe98a,#ffb43e,#fff3c0,#e79a2a,#ffe98a);
    display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#4a2e00;
    box-shadow:0 4px 12px -2px rgba(240,160,30,.6)}
  .hero .info{position:absolute;left:0;right:0;bottom:0;padding:0 16px 15px}
  .hero .info .label{font-size:11px;color:#c8bce0;letter-spacing:1px;font-weight:700}
  .hero .info .name{font-size:27px;font-weight:900;letter-spacing:-.5px;text-shadow:0 2px 8px rgba(0,0,0,.6);line-height:1.05}
  .hero .info .meta{font-size:12px;color:#e8dcff;margin-top:3px}

  /* 메인 CTA */
  .cta{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;
    border-radius:16px;padding:17px;font-size:17px;font-weight:900;color:#fff;font-family:inherit;letter-spacing:-.3px;
    background:linear-gradient(180deg,#ff6588,#ff4d72 50%,#df315a);border:1px solid rgba(255,255,255,.28);
    text-shadow:0 1px 2px rgba(110,10,40,.5);margin-bottom:18px;
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,.5),inset 0 -3px 7px rgba(120,10,42,.42),0 10px 22px -6px rgba(255,77,114,.6)}

  /* 아이콘 타일 메뉴 */
  .menu{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
  .tile{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;
    padding:14px 6px 11px;text-align:center;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
  .tile .ti{width:42px;height:42px;margin:0 auto 7px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .tile.t1 .ti{background:linear-gradient(145deg,#3a5fb0,#22407e)}
  .tile.t2 .ti{background:linear-gradient(145deg,#8a3fd0,#5a2496)}
  .tile.t3 .ti{background:linear-gradient(145deg,#d08a1a,#a05e10)}
  .tile.t4 .ti{background:linear-gradient(145deg,#c93f6a,#8a2446)}
  .tile .tl{font-size:12px;font-weight:800}
  .tile .dot{position:absolute;top:9px;right:11px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}

  /* 하단 탭바 */
  .tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;z-index:5;
    display:flex;justify-content:space-around;padding:9px 8px calc(9px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(24,17,40,.6),rgba(12,9,23,.96));backdrop-filter:blur(12px);
    border-top:1px solid rgba(255,255,255,.1)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#8a7ea8;flex:1}
  .tab .tic{font-size:21px;filter:grayscale(.4) opacity(.8)}
  .tab.on{color:#fff}
  .tab.on .tic{filter:none;transform:translateY(-1px)}
  .tab.on::before{content:"";position:absolute;top:0;width:34px;height:3px;border-radius:0 0 4px 4px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .caption{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:6;background:rgba(0,0,0,.7);
    color:#ffd36b;font-size:11.5px;font-weight:800;padding:6px 14px;border-radius:999px;white-space:nowrap;border:1px solid rgba(255,211,107,.3)}
</style></head>
<body>
<div id="app">
  <div class="wrap">
    <!-- 프로필/재화 -->
    <div class="top">
      <div class="logo">🐤</div>
      <div class="who"><div class="nm">스텔라 엔터</div><div class="lv">Lv.12 프로듀서 · 연습생 24명</div></div>
      <div class="cur"><span class="chip">🎴 <b>28</b></span></div>
      <div class="icobtn">⚙️</div>
    </div>

    <!-- 대표 데뷔조 히어로 -->
    <div class="hero">
      <div class="imgs">
        <div style="background-image:url('https://dcyuonzxltfl2140514.gcdn.ntruss.com/faces/20260714/705/7051683af6e7079fefa4fd1aec38279de84bf885e4ffeb09c05b631d64a42138733e_o_st.webp')"></div>
        <div style="background-image:url('https://dcyuonzxltfl2140514.gcdn.ntruss.com/faces/20260714/333/3331d768de082e59900d52ccea8e9defb31ec97fce11254c32d5172b5fbd1779ff1f_o_st.jpg')"></div>
        <div style="background-image:url('https://dcyuonzxltfl2140514.gcdn.ntruss.com/faces/20260714/386/3861b8ea303e68dacbf53166b3a9227c358bc549a363e8263aec2c36979e5e3dac6c_o_st.webp')"></div>
      </div>
      <div class="ov"></div>
      <div class="badge"><span class="b-live">● 활동중</span><span class="b-rank">🏆 차트 3위</span></div>
      <div class="gr">S</div>
      <div class="info"><div class="label">MY DEBUT GROUP</div><div class="name">STELLAR</div><div class="meta">9인 완전체 · 합산 4,820 · 팬 182만</div></div>
    </div>

    <!-- 메인 액션 -->
    <button class="cta">✨ 새 연습생 육성하기</button>

    <!-- 아이콘 타일 메뉴 -->
    <div class="menu">
      <div class="tile t1"><div class="ti">📋</div><div class="tl">숙소</div></div>
      <div class="tile t2"><div class="ti">⚗️</div><div class="tl">조합소</div><div class="dot"></div></div>
      <div class="tile t3"><div class="ti">🏆</div><div class="tl">차트</div></div>
      <div class="tile t4"><div class="ti">🏅</div><div class="tl">업적</div></div>
    </div>
  </div>

  <!-- 하단 탭바 -->
  <div class="tabbar">
    <div class="tab on" style="position:relative"><span class="tic">🏠</span>홈</div>
    <div class="tab"><span class="tic">👥</span>편성</div>
    <div class="tab"><span class="tic">🎴</span>컬렉션</div>
    <div class="tab"><span class="tic">🏆</span>랭킹</div>
    <div class="tab"><span class="tic">☰</span>메뉴</div>
  </div>
  <div class="caption">↑ 세로 버튼 리스트 → 게임 홈 대시보드 + 하단 탭바</div>
</div>
</body></html>
